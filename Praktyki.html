<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Praktyki</title>
<script src="Praktyki.js"></script>
<script>
    function napiszDanenastronie() {
    let imie = document.getElementById("imie").value;
    let drugieimie = document.getElementById("drugie_imie").value;
    let nazwisko = document.getElementById("nazwisko").value;
    let drugieNazwisko = document.getElementById("drugie_nazwisko").value;
    let miasto = document.getElementById("miasto").value;
    let data = document.getElementById("urodziny").value;

    if (document.getElementById("plec_M").checked) {
            plec = "H"; // Hombre (Mężczyzna)
        } else if (document.getElementById("plec_K").checked){
            plec = "M"; // Mujer (Kobieta)
        } else {
            plec = "X"; // Non-binary
        }
    let finalnyKod = generujeCURP(nazwisko, drugieNazwisko, imie, drugieimie, plec, miasto, data);

    let komunikat = wyswietlDane(imie, drugieimie, nazwisko, drugieNazwisko, miasto, data, plec, finalnyKod);
document.getElementById("wynik").innerHTML = komunikat;
}
</script>
</head>
<body>
    <form action="Ankieta">
  <fieldset>
    <legend>CURP</legend>
    Surname:<br>
    <input type="text" id="nazwisko" name="nazwisko"><br><br>
    Second Surname:<br>
    <input type="text" id="drugie_nazwisko" name="drugie_nazwisko"><br><br>
    Name:<br>
    <input type="text" id="imie"  name="imie"><br><br>
    Second Name:<br>
    <input type="text" id="drugie_imie" name="drugie_imie"><br><br>
    Birth:<br>
    <input type="date" id="urodziny" name="urodziny"><br><br>
    Gender:<br>
        <input type="radio" id="plec_M" name="plec" value="Mężczyzna"> Male<br>
        <input type="radio" id="plec_K" name="plec" value="Kobieta"> Women<br>
        <input type="radio" id="plec_N" name="plec" value="Non-binary"> Non-binary<br>

        <input list="miejsce_urodzenia" id="miasto">
    <datalist id="miejsce_urodzenia">
        <option name="AG" value="Aguascalientes"></option>
        <option name="BC" value="Baja California Norte"></option>
        <option name="BS" value="Baja California Sur"></option>

        <option name="CO" value="Coahuila"></option>
        <option name="CS" value="Chiapas"></option>
        <option name="DF" value="Distrito Federal"></option>
        <option name="DG" value="Durango"></option>
        <option name="GR" value="Guerrero"></option>
        <option name="GT" value="Guanajuato"></option>
        <option name="HG" value="Hidalgo"></option>
        <option name="JA" value="Jalisco"></option>
        <option name="MI" value="Michoacan"></option>
        <option name="MO" value="Morelos"></option>
        <option name="NA" value="Nayarit"></option>
        <option name="NL" value="Nuevo Leon"></option>
        <option name="OA" value="Oaxaca"></option>
        <option name="PU" value="Puebla"></option>
        <option name="QR" value="Quintana Roo"></option>
        <option name="QT" value="Queretaro"></option>
        <option name="SI" value="Sinaloa"></option>
        <option name="SL" value="San Luis Potosi"></option>
        <option name="SO" value="Sonora"></option>
        <option name="TB" value="Tabasco"></option>
        <option name="TL" value="Tlaxcala"></option>
        <option name="TM" value="Tamaulipas"></option>
        <option name="VE" value="Veracruz"></option>

    </datalist></br>
    </br>
    <input type="reset">
  </fieldset>
</br>

</body>
</html>
